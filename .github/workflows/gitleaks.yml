name: gitleaks

on:
  push:
  pull_request:
  workflow_dispatch:

# gitleaks-action lists the PR's commits on pull_request events; the default
# GITHUB_TOKEN on this repo is contents:read only, so that call 403s
# ("Resource not accessible by integration"). Grant least-privilege read.
permissions:
  contents: read
  pull-requests: read

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GITLEAKS_LICENSE only required for GitHub orgs, not personal accounts.
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
  # clang-format gate so formatting is caught at commit time, not just by the
  # CI format-check job. Pinned to v18.x to match the CI runner's apt
  # clang-format (ubuntu-latest ships clang-format 18); do NOT
  # `pre-commit autoupdate` past v18 or the hook drifts ahead of CI and
  # reformat-churns. Uses the repo .clang-format by default.
  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v18.1.8
    hooks:
      - id: clang-format
        types_or: [c, c++]
        exclude: '^third_party/'
